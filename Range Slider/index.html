<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="gfg">
            <p>Daniel Here</p>
        </div>
        <div class="custom-wrapper">
            <div class="header">
                <h2 class="projtitle">Range Slider</h2>
            </div>
            <div class="input-container">
                <div class="input">
                    <div class="field">
                        <span>Minimum Price</span>
                        <input type="number" class="min-input" value="2500">
                    </div>
                    <div class="field">
                        <span>Maximum Price</span>
                        <input type="number" class="max-input" value="9500">
                    </div>
                </div>
                <div class="slider">
                    <div class="range-slider"></div>
                </div>
            </div>
            <!-- Slider Logic code here connected -->
             <div class="range-input">
                <input type="range" class="min-range" min="0" max="10000" value="2500" step="1">
                <input type="range" class="max-range" min="0" max="10000" value="8500" step="1">
             </div>
        </div>
    </div>
    <script src="logic.js"></script>
</body>
</html>
